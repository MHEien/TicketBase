# =============================================================================
# Development docker-compose — storage services only.
# Apps (API, Plugins) run locally via `bun run dev`.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   bun run seed        # after first boot
# =============================================================================

services:
  postgres:
    image: postgres:16
    container_name: tickets-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ticketing
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: tickets-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    ports:
      - "27017:27017"
    volumes:
      - mongo_dev_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: tickets-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    volumes:
      - minio_dev_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot container that creates the MinIO bucket on first boot
  minio-init:
    image: minio/mc:latest
    container_name: tickets-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb local/plugin-bundles --ignore-existing;
        mc anonymous set download local/plugin-bundles;
        echo '✅ MinIO bucket plugin-bundles ready';
      "

  # Adminer — lightweight Postgres web UI at http://localhost:8080
  adminer:
    image: adminer
    container_name: tickets-adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_dev_data:
  mongo_dev_data:
  minio_dev_data:
